<!-- work order column container -->
<div class="work-order-column">
  <!-- header -->
  <div class="timeline-header-row">Work Center</div>

  <!-- dynamic work centers, w/increased first row height per sketch -->
  <div
    *ngFor="let wc of workCenters; let i = index; trackBy: trackByDocId"
    class="aligned-rows work-center-rows"
    [class.first-row]="i === 0"
  >
    {{ wc.data.name }}
  </div>
</div>
